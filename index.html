<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Informasi Apel Pegawai - SBB</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }

        #report-area { 
            width: 100%; 
            max-width: 480px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header-kop { display: flex; align-items: center; padding: 15px 20px; background: white; border-bottom: 3px solid #000; gap: 15px; }
        .logo-kab { width: 45px; height: 55px; object-fit: contain; }
        .opd-info b { font-size: 14px; color: #111; display: block; text-transform: uppercase; line-height: 1.2; }
        .opd-info span { font-size: 10px; color: #444; font-weight: bold; }

        #photo-container { position: relative; width: 100%; background: #000; line-height: 0; overflow: hidden; height: 280px; border-bottom: 2px solid #eee; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #snapshot-canvas { display: none; width: 100%; }

        .cam-ui { position: absolute; z-index: 10; transition: opacity 0.2s; }
        .cam-controls {
            bottom: 10px; left: 10px; right: 10px;
            display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.5);
            padding: 10px; border-radius: 8px;
        }
        .cam-row { display: flex; align-items: center; gap: 10px; color: white; font-size: 11px; }
        .cam-row input { flex: 1; accent-color: var(--success); }

        #switch-btn {
            top: 10px; right: 10px;
            background: var(--success); color: white; border: none;
            padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: bold;
        }

        .data-footer { padding: 15px; background: white; display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; }
        .footer-section h4 { margin: 0 0 6px 0; font-size: 10px; color: var(--success); border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .info-text { font-size: 9px; color: #333; line-height: 1.4; margin-bottom: 8px; }
        
        .perc-display-box { 
            padding: 8px; background: #f9f9f9; 
            border-radius: 6px; text-align: center; border: 1px solid #eee;
        }
        .perc-val { font-size: 24px; font-weight: 900; color: var(--success); line-height: 1; }

        .rekap-grid { display: grid; grid-template-columns: 1fr auto; gap: 3px; font-size: 10px; }
        .status-badge { display: block; padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 9px; margin-bottom: 6px; text-align: center; box-sizing: border-box; }
        .status-in { background: var(--success); }
        .status-out { background: var(--danger); }
        .locked-val { color: var(--warning) !important; font-weight: 900; }

        .controls { width: 92%; max-width: 480px; margin: 15px 0; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .setting-group { margin-bottom: 15px; padding: 10px; background: #f0f4f7; border-radius: 8px; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .btn-main { background: var(--success); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-lock { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; margin-bottom: 10px; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        label { font-size: 11px; font-weight: bold; color: var(--primary); display: block; margin-bottom: 4px; }
    </style>
</head>
<body onload="startApp()">

    <div id="report-area">
        <div class="header-kop">
            <img src="img/Kab-sbb.png" class="logo-kab">
            <div class="opd-info">
                <span>PEMERINTAH KABUPATEN SERAM BAGIAN BARAT</span>
                <b id="opd-name-top">BKPSDM </b>
            </div>
        </div>

        <div id="photo-container">
            <button id="switch-btn" class="cam-ui" onclick="toggleCamera()">🔄 KAMERA</button>
            <div class="cam-controls cam-ui">
                <div class="cam-row">🔍 Zoom: <input type="range" id="zoom-range" min="1" max="3" step="0.1" value="1" oninput="applyZoom()"></div>
            </div>
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <canvas id="snapshot-canvas"></canvas>
        </div>

        <div class="data-footer">
            <div class="footer-section">
                <h4>WAKTU & LOKASI</h4>
                <div class="info-text">
                    📅 <span id="wm-date">-</span><br>
                    ⏰ <span id="wm-time">-</span><br>
                    📍 <span id="location-text">GPS...</span><br>
                    📏 <b id="distance-info">0m</b>
                </div>
                
                <div id="zone-status" class="status-badge status-out">DI LUAR AREA</div>
                
                <div class="perc-display-box">
                    <div class="perc-val" id="perc-display">0%</div>
                    <div style="font-size: 7px; color: #888;">PERSENTASE HADIR</div>
                </div>
            </div>
            
            <div class="footer-section">
                <h4>REKAPITULASI <span id="lock-icon" style="display:none;">🔒</span></h4>
                <div class="rekap-grid">
                    <span>Total Pegawai:</span> <b id="out-total">0</b>
                    <span>Hadir (AI):</span> <b id="out-hadir" style="color:var(--success);">0</b>
                    <span>PPPK PW Off:</span> <b id="out-pppk">0</b>
                    <span>Cuti:</span> <b id="out-cuti">0</b>
                    <span>Izin:</span> <b id="out-izin">0</b>
                    <span>Sakit:</span> <b id="out-sakit">0</b>
                    <span>Tugas Dinas:</span> <b id="out-tugas">0</b>
                    <span>Izin Belajar:</span> <b id="out-belajar">0</b>
                    <span style="color:var(--danger); font-weight:bold;">Tanpa Ket:</span> <b id="out-alpa" style="color:var(--danger);">0</b>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="setting-group">
            <label>⚙️ PENGUNCIAN DATA</label>
            <button id="btn-lock-toggle" class="btn-lock" onclick="toggleLock()">🔓 KUNCI JUMLAH HADIR</button>
        </div>

        <label>Nama OPD:</label>
        <input type="text" id="input-opd" placeholder="Contoh: BKPSDM" oninput="syncText(this, 'opd-name-top')" style="margin-bottom:12px;">
        
        <label>Total Seluruh Pegawai:</label>
        <input type="number" id="in-total" placeholder="Total" oninput="calculateReport()" style="margin-bottom:12px; border: 2px solid var(--success);">

        <div class="grid-input">
            <div><label>PPPK PW Off:</label><input type="number" id="in-pppk" placeholder="0" oninput="calculateReport()" style="background: #fff9e6;"></div>
            <div><label>Cuti:</label><input type="number" id="in-cuti" placeholder="0" oninput="calculateReport()"></div>
            <div><label>Izin:</label><input type="number" id="in-izin" placeholder="0" oninput="calculateReport()"></div>
            <div><label>Sakit:</label><input type="number" id="in-sakit" placeholder="0" oninput="calculateReport()"></div>
            <div><label>Tugas Dinas:</label><input type="number" id="in-tugas" placeholder="0" oninput="calculateReport()"></div>
            <div><label>Izin Belajar:</label><input type="number" id="in-belajar" placeholder="0" oninput="calculateReport()"></div>
        </div>

        <button class="btn-main" id="btn-save" onclick="generateFastPDF()" disabled>MENUNGGU SINYAL GPS...</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnSave = document.getElementById('btn-save');
        let currentStream = null, useFrontCamera = true, isLocked = false, lockedCount = 0;
        
        const OFFICE_LAT = -3.066494, OFFICE_LNG = 128.230482, ALLOWED_DISTANCE = 500; 

        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('btn-lock-toggle');
            const display = document.getElementById('out-hadir');
            if(isLocked) {
                lockedCount = parseInt(display.innerText);
                btn.innerHTML = "🔒 BUKA KUNCI (RESET)";
                btn.style.background = "var(--warning)";
                document.getElementById('lock-icon').style.display = "inline";
                display.classList.add('locked-val');
            } else {
                btn.innerHTML = "🔓 KUNCI JUMLAH HADIR";
                btn.style.background = "var(--primary)";
                document.getElementById('lock-icon').style.display = "none";
                display.classList.remove('locked-val');
            }
            calculateReport();
        }

        function calculateReport() {
            const total = parseInt(document.getElementById('in-total').value) || 0;
            const pppk = parseInt(document.getElementById('in-pppk').value) || 0;
            const cuti = parseInt(document.getElementById('in-cuti').value) || 0;
            const izin = parseInt(document.getElementById('in-izin').value) || 0;
            const sakit = parseInt(document.getElementById('in-sakit').value) || 0;
            const tugas = parseInt(document.getElementById('in-tugas').value) || 0;
            const belajar = parseInt(document.getElementById('in-belajar').value) || 0;
            const hadir = isLocked ? lockedCount : (parseInt(document.getElementById('out-hadir').innerText) || 0);

            if(isLocked) document.getElementById('out-hadir').innerText = lockedCount;
            
            document.getElementById('out-total').innerText = total;
            document.getElementById('out-pppk').innerText = pppk;
            document.getElementById('out-cuti').innerText = cuti;
            document.getElementById('out-izin').innerText = izin;
            document.getElementById('out-sakit').innerText = sakit;
            document.getElementById('out-tugas').innerText = tugas;
            document.getElementById('out-belajar').innerText = belajar;

            // Alpa = Total - Semua kategori kehadiran
            let alpa = total - (hadir + pppk + cuti + izin + sakit + tugas + belajar);
            document.getElementById('out-alpa').innerText = alpa < 0 ? 0 : alpa;

            // Persentase = (Hadir AI + PPPK Paruh Waktu) / Total
            const totalHadirNyata = hadir + pppk;
            const perc = total > 0 ? Math.round((totalHadirNyata / total) * 100) : 0;
            document.getElementById('perc-display').innerText = perc + "%";
        }

        async function applyZoom() {
            if (!currentStream) return;
            const track = currentStream.getVideoTracks();
            try { await track.applyConstraints({ advanced: [{ zoom: parseFloat(document.getElementById('zoom-range').value) }] }); } 
            catch (e) { video.style.transform = (useFrontCamera ? "scaleX(-1) " : "") + `scale(${document.getElementById('zoom-range').value})`; }
        }

        async function startApp() {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                initCamera();
                initGPS();
                setInterval(() => {
                    const n = new Date();
                    document.getElementById('wm-time').innerText = n.toLocaleTimeString('id-ID');
                    document.getElementById('wm-date').innerText = n.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                }, 1000);
            } catch (err) { alert("AI Gagal Dimuat!"); }
        }

        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFrontCamera ? "user" : "environment" } });
            video.srcObject = currentStream;
            video.onloadedmetadata = detectFaces;
        }

        function toggleCamera() { useFrontCamera = !useFrontCamera; video.classList.toggle('mirror'); initCamera(); }

        async function detectFaces() {
            const canvas = document.getElementById('overlay');
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                if(!isLocked) { document.getElementById('out-hadir').innerText = detections.length; calculateReport(); }
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, faceapi.resizeResults(detections, displaySize));
            }, 600);
        }

        function initGPS() {
            navigator.geolocation.watchPosition(pos => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, OFFICE_LAT, OFFICE_LNG);
                document.getElementById('location-text').innerText = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
                document.getElementById('distance-info').innerText = Math.round(dist) + "m";
                const inside = dist <= ALLOWED_DISTANCE;
                btnSave.disabled = !inside;
                btnSave.innerText = inside ? "💾 SIMPAN PDF" : "DI LUAR RADIUS";
                document.getElementById('zone-status').innerText = inside ? "DALAM AREA" : "DI LUAR AREA";
                document.getElementById('zone-status').className = "status-badge " + (inside ? "status-in" : "status-out");
            }, null, { enableHighAccuracy: true });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function syncText(el, id) { document.getElementById(id).innerText = el.value || 'BKPSDM KAB. SBB'; }

        async function generateFastPDF() {
            btnSave.innerText = "⏳ PROSES...";
            const ui = document.querySelectorAll('.cam-ui');
            ui.forEach(el => el.style.opacity = '0');
            const area = document.getElementById('report-area'), snap = document.getElementById('snapshot-canvas');
            snap.width = video.videoWidth; snap.height = video.videoHeight;
            const ctx = snap.getContext('2d');
            if(useFrontCamera) { ctx.translate(snap.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0);
            video.style.display = 'none'; snap.style.display = 'block';
            try {
                const canvas = await html2canvas(area, { useCORS: true, scale: 2 });
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                pdf.save(`APEL_SBB_${Date.now()}.pdf`);
            } catch (e) { alert("Gagal!"); } finally {
                ui.forEach(el => el.style.opacity = '1');
                video.style.display = 'block'; snap.style.display = 'none';
                btnSave.innerText = "💾 SIMPAN PDF";
            }
        }
    </script>
</body>
</html>
